name: Deploy Fogón

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-web:
    name: Build Web and Deploy to GitHub Pages
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: true
      
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
        working-directory: ./client
      
      - name: Build client
        run: npm run build
        working-directory: ./client
      
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v2
        with:
          path: './client/dist'

  build-apk:
    name: Build APK (Optional)
    needs: build-web
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: true
      
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'
      
      - name: Install Capacitor
        run: npm install @capacitor/cli
        working-directory: ./client
      
      - name: Sync Capacitor
        run: npx cap sync android
        working-directory: ./client
      
      - name: Set up Java
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
      
      - name: Build APK
        run: ./gradlew assembleDebug
        working-directory: ./client/android
      
      - name: Upload APK artifact
        uses: actions/upload-artifact@v3
        with:
          name: fogon.apk
          path: './client/android/app/build/outputs/apk/debug/app-debug.apk'