name: Deploy Fogón

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-web:
    name: Build Web
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Capacitor CLI
        run: npm install @capacitor/cli @capacitor/core

      - name: Build client
        run: npm run build --workspace=client

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          name: github-pages
          path: ./client/dist

  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: build-web
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  build-apk:
    name: Build APK (Required)
    needs: build-web
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci
        working-directory: ./client

      - name: Install Capacitor CLI
        run: npm install @capacitor/cli @capacitor/core @capacitor/android
        working-directory: ./client # <--- NEW: Run in client directory

      - name: Add Android platform
        run: npx cap add android
        working-directory: ./client # <--- NEW: Run in client directory

      - name: Sync Capacitor
        run: npx cap sync android
        working-directory: ./client # <--- NEW: Separate step for sync, run in client directory

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build APK
        run: ./gradlew assembleDebug --stacktrace
        working-directory: ./client/android # <--- NEW: Set working-directory directly

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: fogon.apk
          path: ./android/app/build/outputs/apk/debug/app-debug.apk
